<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0f">
<title>MultiStream</title>
</head>
<body style="margin:0;padding:0;background:#0a0a0f;color:#eee;font-family:-apple-system,BlinkMacSystemFont,sans-serif">

<!-- NAV -->
<div id="NAV" style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:#111118;border-bottom:1px solid #2a2a3a;position:sticky;top:0;z-index:50">
    <div style="font-weight:800;font-size:16px;color:#6366f1">MULTI<span style="color:#555570;font-weight:400">STREAM</span></div>
    <div style="display:flex;gap:5px;align-items:center">
        <div id="GPICK" style="display:flex;background:#1a1a26;border-radius:6px;border:1px solid #2a2a3a;overflow:hidden"></div>
        <button onclick="togglePanel()" style="width:34px;height:34px;border-radius:8px;border:1px solid #2a2a3a;background:#6366f1;color:#fff;font-size:16px;font-weight:700;cursor:pointer">+</button>
        <button onclick="doReset()" style="width:34px;height:34px;border-radius:8px;border:1px solid #2a2a3a;background:#1a1a26;color:#999;font-size:14px;cursor:pointer">↺</button>
    </div>
</div>

<!-- ADD PANEL -->
<div id="PANEL" style="display:none;padding:10px 12px;background:#111118;border-bottom:1px solid #2a2a3a">
    <div style="display:flex;gap:6px">
        <input id="INP" type="url" placeholder="YouTube URL del live" style="flex:1;min-width:0;background:#1a1a26;border:1px solid #2a2a3a;color:#eee;font-size:14px;padding:10px;border-radius:8px;outline:none">
        <button onclick="doAdd()" style="background:#6366f1;border:none;color:#fff;font-weight:800;font-size:16px;padding:10px 16px;border-radius:8px;cursor:pointer">+</button>
    </div>
    <div style="font-size:10px;color:#555570;margin-top:5px">Pega un link de YouTube. Los videos se reproducen <span style="color:#06b6d4">directo en la app</span>.</div>
    <div id="PRESETS" style="display:flex;gap:4px;flex-wrap:wrap;margin-top:8px"></div>
</div>

<!-- GRID -->
<div id="GRID"></div>

<script>
// ═══════════════════════════════════════
//  DATA
// ═══════════════════════════════════════
var PRESETS = [
    ["Al Mayadeen","VQBbWxioQFg"],
    ["Al Araby","e2RgSa1Wt5o"],
    ["Al Ghad","4N5jTVWB7vA"],
    ["Al Manar","https://www.almanar.com.lb/live/"],
    ["NBN","https://nbn.com.lb"],
    ["Al Jazeera AR","bNyUyrR0PHo"],
    ["Al Jazeera EN","F-POY4Q0QSI"],
    ["France 24 ES","Y-IbBLz4pCo"],
    ["France 24 FR","l8PMl7tUDIE"],
    ["DW Español","wBDRBFqzkIM"],
    ["Sky News AR","XAkMiJmEMYA"],
    ["Al Arabiya","1Kg8LNDEeaE"],
    ["TRT World","TV9AjkHWjKA"],
    ["RT Español","OALyNZw4bqs"],
    ["TeleSUR","1-K4MFqxF6U"]
];

var DEFAULTS = [
    {id:1,n:"Al Mayadeen",v:"VQBbWxioQFg"},
    {id:2,n:"Al Araby",v:"e2RgSa1Wt5o"},
    {id:3,n:"Al Ghad",v:"4N5jTVWB7vA"},
    {id:4,n:"Al Manar",u:"https://www.almanar.com.lb/live/"}
];

var GRIDS = [1,2,4,6,9];
var ch = [];
var gs = 2;
var nid = 100;
var fsId = null;

// ═══════════════════════════════════════
//  STORAGE
// ═══════════════════════════════════════
function save() {
    try { localStorage.setItem("ms3", JSON.stringify(ch)); localStorage.setItem("ms3g", gs); } catch(e) {}
}

function load() {
    try {
        var d = localStorage.getItem("ms3");
        if (d) {
            ch = JSON.parse(d);
            if (ch && ch.length > 0) {
                for (var i = 0; i < ch.length; i++) {
                    if (ch[i].id >= nid) nid = ch[i].id + 1;
                }
                return;
            }
        }
    } catch(e) {}
    ch = [];
    for (var i = 0; i < DEFAULTS.length; i++) {
        ch.push({id: DEFAULTS[i].id, n: DEFAULTS[i].n, v: DEFAULTS[i].v, u: DEFAULTS[i].u});
    }
    nid = 10;
    save();
}

function loadGrid() {
    try { var g = localStorage.getItem("ms3g"); if (g) gs = parseInt(g); } catch(e) {}
    if (GRIDS.indexOf(gs) < 0) gs = 2;
}

// ═══════════════════════════════════════
//  YT HELPERS
// ═══════════════════════════════════════
function ytEmbed(v) {
    return "https://www.youtube.com/embed/" + v + "?autoplay=1&mute=0&playsinline=1&rel=0";
}

function extractVid(url) {
    var m;
    m = url.match(/[?&]v=([a-zA-Z0-9_-]{11})/); if (m) return m[1];
    m = url.match(/youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/); if (m) return m[1];
    m = url.match(/youtube\.com\/live\/([a-zA-Z0-9_-]+)/); if (m) return m[1];
    m = url.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/); if (m) return m[1];
    return null;
}

function esc(s) {
    var d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
}

// ═══════════════════════════════════════
//  GRID PICKER
// ═══════════════════════════════════════
function buildGPick() {
    var html = "";
    for (var i = 0; i < GRIDS.length; i++) {
        var g = GRIDS[i];
        var on = (g === gs) ? "background:#6366f1;color:#fff" : "background:none;color:#555570";
        html += '<button onclick="setGrid(' + g + ')" style="border:none;font-size:13px;font-weight:700;padding:7px 11px;cursor:pointer;border-right:1px solid #2a2a3a;' + on + '">' + g + '</button>';
    }
    document.getElementById("GPICK").innerHTML = html;
}

function setGrid(g) {
    gs = g;
    buildGPick();
    render();
    save();
}

// ═══════════════════════════════════════
//  ADD PANEL
// ═══════════════════════════════════════
function togglePanel() {
    var p = document.getElementById("PANEL");
    if (p.style.display === "none") {
        p.style.display = "block";
        document.getElementById("INP").focus();
    } else {
        p.style.display = "none";
    }
    render();
}

function doAdd() {
    var inp = document.getElementById("INP");
    var url = inp.value.trim();
    if (!url) return;
    var v = extractVid(url);
    var obj = {id: nid++, n: v ? "Stream" : "Live"};
    if (v) obj.v = v; else obj.u = url;

    // Check duplicates
    for (var i = 0; i < ch.length; i++) {
        if (v && ch[i].v === v) return;
        if (!v && ch[i].u === url) return;
    }

    ch.push(obj);
    inp.value = "";
    save();
    render();
}

function addPreset(name, val) {
    var isUrl = val.indexOf("http") === 0;
    var v = isUrl ? null : val;
    var u = isUrl ? val : null;

    // Check duplicates
    for (var i = 0; i < ch.length; i++) {
        if (v && ch[i].v === v) return;
        if (u && ch[i].u === u) return;
    }

    ch.push({id: nid++, n: name, v: v, u: u});
    save();
    render();
}

// ═══════════════════════════════════════
//  BUILD PRESETS
// ═══════════════════════════════════════
function buildPresets() {
    var html = "";
    for (var i = 0; i < PRESETS.length; i++) {
        var p = PRESETS[i];
        html += '<button onclick="addPreset(\'' + p[0].replace(/'/g,"\\'") + '\',\'' + p[1] + '\')" style="background:#1a1a26;border:1px solid #2a2a3a;color:#9999b0;font-size:10px;padding:4px 9px;border-radius:12px;cursor:pointer;white-space:nowrap">' + p[0] + '</button>';
    }
    document.getElementById("PRESETS").innerHTML = html;
}

// ═══════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════
function delCh(id, ev) {
    if (ev) ev.stopPropagation();
    var arr = [];
    for (var i = 0; i < ch.length; i++) {
        if (ch[i].id !== id) arr.push(ch[i]);
    }
    ch = arr;
    save();
    render();
}

function reloadCh(id, ev) {
    if (ev) ev.stopPropagation();
    var f = document.querySelector('.cell[data-id="' + id + '"] iframe');
    if (f) f.src = f.src;
}

function fsCh(id, ev) {
    if (ev) ev.stopPropagation();
    var el = document.querySelector('.cell[data-id="' + id + '"]');
    if (!el) return;
    if (fsId === id) {
        el.style.cssText = "";
        fsId = null;
    } else {
        if (fsId) {
            var old = document.querySelector('.cell[data-id="' + fsId + '"]');
            if (old) old.style.cssText = "";
        }
        el.style.cssText = "position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;border-radius:0;border:none";
        fsId = id;
    }
}

function popCh(id, ev) {
    if (ev) ev.stopPropagation();
    for (var i = 0; i < ch.length; i++) {
        if (ch[i].id === id) {
            var c = ch[i];
            if (c.v) window.open("https://www.youtube.com/watch?v=" + c.v, "_blank");
            else if (c.u) window.open(c.u, "_blank");
            break;
        }
    }
}

function doReset() {
    if (!confirm("Volver a canales por defecto?")) return;
    ch = [];
    for (var i = 0; i < DEFAULTS.length; i++) {
        ch.push({id: DEFAULTS[i].id, n: DEFAULTS[i].n, v: DEFAULTS[i].v, u: DEFAULTS[i].u});
    }
    nid = 10;
    save();
    render();
}

// ═══════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════
function render() {
    var cols, rows;
    if (gs === 1) { cols = 1; rows = 1; }
    else if (gs === 2) { cols = 2; rows = 1; }
    else if (gs === 4) { cols = 2; rows = 2; }
    else if (gs === 6) { cols = 2; rows = 3; }
    else if (gs === 9) { cols = 3; rows = 3; }
    else { cols = 2; rows = 1; }

    var panelOpen = document.getElementById("PANEL").style.display !== "none";
    var navH = 55 + (panelOpen ? 145 : 0);
    var gridH = "calc(100vh - " + navH + "px)";

    var g = document.getElementById("GRID");
    g.style.cssText = "display:grid;gap:3px;padding:3px;grid-template-columns:repeat(" + cols + ",1fr);grid-template-rows:repeat(" + rows + ",1fr);height:" + gridH;

    var html = "";
    for (var i = 0; i < gs; i++) {
        if (i < ch.length) {
            var c = ch[i];
            var isYt = !!c.v;

            // Cell
            html += '<div class="cell" data-id="' + c.id + '" style="background:#000;border-radius:5px;overflow:hidden;position:relative;border:1px solid #2a2a3a">';

            // Top bar
            html += '<div style="position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:3px 6px;background:linear-gradient(to bottom,rgba(0,0,0,.85),transparent);z-index:5">';
            html += '<span style="font-size:9px;font-weight:700;color:rgba(255,255,255,.9);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:55%">' + esc(c.n) + '</span>';
            html += '<div style="display:flex;gap:3px">';
            if (isYt) html += '<span style="font-size:7px;font-weight:800;padding:1px 5px;border-radius:6px;color:#f00;background:rgba(255,0,0,.15)">YT</span>';
            else html += '<span style="font-size:7px;font-weight:800;padding:1px 5px;border-radius:6px;color:#f59e0b;background:rgba(245,158,11,.15)">WEB</span>';
            html += '<span style="font-size:7px;font-weight:800;padding:1px 5px;border-radius:6px;color:#ef4444;background:rgba(239,68,68,.15)">● LIVE</span>';
            html += '</div></div>';

            // Buttons
            var btnStyle = 'width:22px;height:22px;border-radius:4px;border:none;background:rgba(0,0,0,.55);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer';
            html += '<div style="position:absolute;top:3px;right:3px;display:flex;gap:2px;z-index:6">';
            html += '<button onclick="popCh(' + c.id + ',event)" style="' + btnStyle + '">↗</button>';
            if (isYt) html += '<button onclick="reloadCh(' + c.id + ',event)" style="' + btnStyle + '">↻</button>';
            html += '<button onclick="fsCh(' + c.id + ',event)" style="' + btnStyle + '">⛶</button>';
            html += '<button onclick="delCh(' + c.id + ',event)" style="' + btnStyle + '">✕</button>';
            html += '</div>';

            // Content
            if (isYt) {
                html += '<iframe src="' + ytEmbed(c.v) + '" style="width:100%;height:100%;border:none;background:#000" allow="autoplay;encrypted-media;picture-in-picture;fullscreen" allowfullscreen playsinline></iframe>';
            } else {
                html += '<div style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;text-align:center;padding:8px">';
                html += '<div style="font-size:18px;width:34px;height:34px;border-radius:10px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);display:flex;align-items:center;justify-content:center">↗</div>';
                html += '<div style="font-size:10px;font-weight:700">' + esc(c.n) + '</div>';
                html += '<button onclick="popCh(' + c.id + ',event)" style="background:#f59e0b;border:none;color:#fff;font-size:10px;font-weight:700;padding:5px 12px;border-radius:5px;cursor:pointer">Abrir Live</button>';
                html += '</div>';
            }

            html += '</div>';
        } else {
            // Empty cell
            html += '<div onclick="togglePanel()" style="background:#12121a;border:1px dashed #2a2a3a;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#555570;cursor:pointer">+</div>';
        }
    }

    g.innerHTML = html;
}

// ═══════════════════════════════════════
//  KEYBOARD
// ═══════════════════════════════════════
document.addEventListener("keydown", function(e) {
    if (e.key === "Escape" && fsId) {
        var el = document.querySelector('.cell[data-id="' + fsId + '"]');
        if (el) el.style.cssText = "";
        fsId = null;
    }
});

document.getElementById("INP").addEventListener("keydown", function(e) {
    if (e.key === "Enter") doAdd();
});

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
load();
loadGrid();
buildGPick();
buildPresets();
render();
</script>
</body>
</html>
